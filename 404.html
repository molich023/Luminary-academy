<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Luminary Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { --navy:#0a1628; --gold:#e8a020; --teal:#1a8c7a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--navy); color:white; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px; }
  .container { max-width:500px; }
  .logo { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:white; margin-bottom:60px; display:flex; align-items:center; justify-content:center; gap:12px; }
  .emblem { width:42px; height:42px; background:linear-gradient(135deg,var(--gold),#f5c842); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:900; color:var(--navy); }
  .error-num { font-family:'Playfair Display',serif; font-size:120px; font-weight:900; color:var(--gold); line-height:1; margin-bottom:20px; }
  h1 { font-family:'Playfair Display',serif; font-size:28px; margin-bottom:16px; }
  p { color:rgba(255,255,255,0.6); font-size:16px; line-height:1.7; margin-bottom:36px; }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:14px 32px; border-radius:10px; background:linear-gradient(135deg,var(--gold),#f5c842); color:var(--navy); font-weight:700; text-decoration:none; font-size:15px; transition:transform 0.2s; }
  .btn:hover { transform:translateY(-2px); }
  .links { display:flex; gap:16px; justify-content:center; margin-top:24px; flex-wrap:wrap; }
  .link { color:rgba(255,255,255,0.5); text-decoration:none; font-size:13px; transition:color 0.2s; }
  .link:hover { color:var(--gold); }
</style>
</head>
<body>
  <div class="container">
    <div class="logo"><div class="emblem">L</div>Luminary Academy</div>
    <div class="error-num">404</div>
    <h1>Page Not Found</h1>
    <p>Oops! The page you're looking for doesn't exist. It may have been moved or the link is incorrect.</p>
    <a href="/" class="btn">🏠 Return to Homepage</a>
    <div class="links">
      <a href="/#portals" class="link">Parent Portal</a>
      <a href="/#portals" class="link">Teacher Portal</a>
      <a href="/#portals" class="link">Student Portal</a>
      <a href="/#enroll" class="link">Enroll Now</a>
    </div>
  </div>
</body>
</html>
